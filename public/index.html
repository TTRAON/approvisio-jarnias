<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AppROVISIO — JARNIAS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F9;color:#1E293B;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.login-screen{position:fixed;inset:0;background:#0F172A;display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:24px}
.login-logo img{width:180px;border-radius:12px;display:block}
.login-card{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:360px}
.login-title{font-size:18px;font-weight:700;color:#0F172A;margin-bottom:4px}
.login-sub{font-size:13px;color:#64748B;margin-bottom:24px}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.login-field label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.login-field input{border:1px solid #E2E8F0;border-radius:8px;padding:10px 12px;font-size:14px;color:#1E293B;font-family:inherit;outline:none;background:#F8FAFC}
.login-field input:focus{border-color:#334155;background:#fff}
.login-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:13px;color:#B91C1C;margin-bottom:12px;display:none}
.login-err.show{display:block}
.btn-login{background:#0F172A;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:#1E293B}
.btn-login:disabled{opacity:.6;cursor:default}
.sidebar{width:272px;min-width:272px;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden}
.sb-brand{background:#0F172A;padding:14px 16px;display:flex;align-items:center;gap:10px}
.sb-brand img{width:80px;border-radius:8px;display:block}
.sb-brand-name{font-size:12px;font-weight:700;color:#F1F5F9;letter-spacing:.5px}
.sb-brand-tag{font-size:10px;color:#64748B;margin-top:1px}
.sb-user{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #E2E8F0;background:#F8FAFC}
.sb-user-info{display:flex;align-items:center;gap:8px}
.sb-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:#1E293B}
.sb-user-role{font-size:10px;color:#94A3B8}
.btn-logout{background:none;border:1px solid #E2E8F0;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:#64748B;font-family:inherit}
.btn-logout:hover{background:#FEF2F2;color:#DC2626;border-color:#FECACA}
.sb-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.sb-search{width:100%;border:1px solid #E2E8F0;border-radius:8px;padding:7px 11px;font-size:13px;color:#1E293B;outline:none;background:#F8FAFC;font-family:inherit}
.btn-new-sb{background:#EFF6FF;border:none;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;color:#1D4ED8;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:7px;font-family:inherit}
.btn-new-sb:hover{background:#DBEAFE}
.btn-admin-panel{background:#FEF2F2;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:#B91C1C;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:7px;font-family:inherit}
.btn-admin-panel:hover{background:#FEE2E2}
.cat-group{display:flex;flex-direction:column;gap:4px}
.cat-header{display:flex;align-items:center;gap:6px;padding:5px 2px;cursor:pointer;user-select:none}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#64748B;flex:1}
.cat-count{font-size:10px;color:#94A3B8;background:#F1F5F9;padding:1px 6px;border-radius:8px}
.cat-arrow{font-size:11px;color:#CBD5E1;transition:transform .2s}
.cat-arrow.open{transform:rotate(90deg)}
.cat-cards{display:flex;flex-direction:column;gap:4px;padding-left:6px;border-left:2px solid #F1F5F9}
.sheet-card{border:1px solid #E2E8F0;border-radius:8px;padding:10px 11px;cursor:pointer;background:#FAFBFF;transition:border-color .15s}
.sheet-card:hover{border-color:#94A3B8}
.sheet-card.active{border-color:#3B82F6;background:#EFF6FF}
.sc-name{font-size:13px;font-weight:600;color:#0F172A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.sc-acts{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.sc-btn{background:#fff;border:1px solid #E2E8F0;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;color:#64748B;font-family:inherit;display:inline-flex;align-items:center;gap:3px}
.sc-btn:hover{background:#F1F5F9}
.sc-btn-base{color:#1D4ED8;border-color:#BFDBFE;background:#EFF6FF}
.sc-btn-base:hover{background:#DBEAFE}
.sc-btn-del:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}
.sb-empty{color:#94A3B8;font-size:13px;text-align:center;padding:24px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F172A;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast.show{opacity:1}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
.welcome h1{font-size:24px;font-weight:700;color:#0F172A}
.welcome p{color:#64748B;font-size:15px}
.stats-row{display:flex;gap:10px;margin-top:4px}
.stat-box{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:12px 22px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:#0F172A}
.stat-lbl{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px}
.type-bars{width:100%;max-width:360px}
.type-bars h3{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.tbr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tbr-lbl{width:150px;font-size:12px;color:#64748B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbr-bg{flex:1;background:#E2E8F0;border-radius:3px;height:5px}
.tbr-fill{height:5px;border-radius:3px}
.tbr-n{font-size:11px;color:#94A3B8;width:14px;text-align:right}
.btn-cta{background:#0F172A;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;margin-top:8px}
.btn-cta:hover{background:#1E293B}
.fv{padding:20px 24px;display:flex;flex-direction:column;gap:12px;max-width:960px;margin:0 auto;width:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tb-right{display:flex;gap:6px;flex-wrap:wrap}
.btn-back{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:7px 13px;font-size:13px;color:#64748B;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.btn-back:hover{background:#F8FAFC}
.btn-ai{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#92400E;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-ai:hover:not(:disabled){background:#FEF3C7}
.btn-ai:disabled{opacity:.6;cursor:default}
.btn-catalog{background:#F5F3FF;border:1px solid #C4B5FD;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#6D28D9;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-catalog:hover{background:#EDE9FE}
.btn-ajout{background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#15803D;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-ajout:hover{background:#DCFCE7}
.btn-ajout.active{color:#fff;border-color:transparent}
.btn-print{background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-print:hover{background:#E2E8F0}
.btn-pdf{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#B91C1C;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-pdf:hover{background:#FEE2E2}
.btn-save{background:#10B981;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-save:hover:not(:disabled){background:#059669}
.btn-save.saved{background:#D1FAE5;color:#065F46;cursor:default}
.notice{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:9px 14px;font-size:13px;color:#1D4ED8;display:flex;align-items:center;gap:8px}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 14px;font-size:13px;color:#B91C1C;display:flex;align-items:center;gap:6px}
.addmode-banner{border-radius:10px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid}
.legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:6px 0}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748B}
.leg-swatch{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.1)}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center}
.card-hd-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#0F172A}
.card-hd-count{font-size:11px;background:#F1F5F9;color:#64748B;padding:2px 9px;border-radius:10px}
.doc-header-band{background:#0F172A;padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.doc-header-band img{width:90px;border-radius:8px;display:block}
.doc-header-band-title{font-size:14px;font-weight:700;color:#F1F5F9;letter-spacing:.5px;text-align:right}
.doc-header-band-sub{font-size:10px;color:#64748B;margin-top:2px;text-align:right}
.doc-meta{display:flex;gap:18px;padding:10px 18px;border-bottom:1px solid #F1F5F9;flex-wrap:wrap}
.dm-item label{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:2px}
.dm-val{font-size:12px;color:#334155}
.dm-input{background:transparent;border:none;border-bottom:1px solid #E2E8F0;color:#334155;font-size:12px;font-family:inherit;outline:none;width:115px;padding:1px 0}
.dm-input:focus{border-bottom-color:#3B82F6}
.card-fields{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:13px}
.field-grp{display:flex;flex-direction:column;gap:4px}
.field-grp label{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.field-in{width:100%;border:1px solid #E2E8F0;border-radius:7px;padding:8px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;background:#F8FAFC}
.field-in:focus{border-color:#94A3B8;background:#fff}
.field-in[readonly]{background:#F1F5F9;color:#64748B;cursor:default}
.ai-banner{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.ai-left{display:flex;gap:12px;align-items:flex-start}
.ai-sug-lbl{font-size:10px;color:#92400E;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.ai-sug-type{font-size:19px;font-weight:700;color:#78350F;margin:2px 0}
.ai-conf{font-size:12px;color:#B45309}
.ai-just{font-size:12px;color:#92400E;font-style:italic;margin-top:3px}
.ai-right{display:flex;gap:7px;flex-shrink:0}
.btn-confirm{background:#10B981;border:none;border-radius:7px;padding:8px 15px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
.btn-confirm:hover{background:#059669}
.btn-dismiss{background:none;border:1px solid #FDE68A;border-radius:7px;padding:8px 11px;font-size:13px;cursor:pointer;color:#92400E;font-family:inherit}
.tbl-wrap{overflow-x:auto}
table.at{width:100%;border-collapse:collapse;font-size:13px}
table.at thead tr{background:#F8FAFC;border-bottom:2px solid #E2E8F0}
table.at th{padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748B;font-weight:600;text-align:left}
.th-d{width:44%}.th-q{width:13%}.th-av{width:22%}.th-ret{width:52px;text-align:center!important}.th-x{width:36px}
table.at tr.tr{border-bottom:1px solid #F1F5F9}
table.at tr.tr:last-child{border-bottom:none}
table.at td{padding:0}
.cin{width:100%;background:none;border:none;padding:8px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none}
.cin::placeholder{color:#CBD5E1}
.cin[readonly]{color:#64748B;cursor:default}
.csel{width:100%;background:none;border:none;padding:8px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;cursor:pointer}
.btn-ret{background:none;border:1px solid #E2E8F0;color:#94A3B8;cursor:pointer;padding:3px 6px;border-radius:5px;font-size:12px;line-height:1;display:inline-flex;align-items:center;gap:3px}
.btn-ret:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}
.btn-ret.returned{background:#FEE2E2;border-color:#FECACA;color:#B91C1C}
.btn-del-row{background:none;border:none;color:#CBD5E1;cursor:pointer;padding:4px 6px;border-radius:4px;line-height:1}
.btn-del-row:hover{color:#EF4444;background:#FEF2F2}
.btn-add-row{background:none;border:none;color:#64748B;font-size:12px;cursor:pointer;padding:8px 16px;font-family:inherit;display:flex;align-items:center;gap:6px;border-top:1px solid #F1F5F9;width:100%}
.btn-add-row:hover{color:#1E293B;background:#F8FAFC}
.obs-ta{width:100%;background:none;border:none;padding:13px 18px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;resize:vertical;min-height:80px}
.obs-ta[readonly]{color:#64748B;cursor:default}
.type-pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;border:1px solid transparent}
.cat-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:500}
.cat-panel{display:none;position:fixed;right:0;top:0;bottom:0;width:400px;background:#fff;z-index:501;overflow-y:auto;border-left:1px solid #E2E8F0;flex-direction:column}
.cat-panel.open{display:flex}
.cat-panel-hd{padding:16px 18px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.cat-panel-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#0F172A}
.cat-close{background:none;border:1px solid #E2E8F0;border-radius:8px;padding:5px 8px;cursor:pointer;color:#64748B;font-size:14px;line-height:1}
.cat-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:14px}
.cat-sec{border:1px solid #E2E8F0;border-radius:10px;overflow:hidden}
.cat-sec-hd{background:#F8FAFC;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E2E8F0}
.cat-sec-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#0F172A;text-transform:uppercase;letter-spacing:.5px}
.btn-select-all{background:none;border:none;font-size:11px;color:#6D28D9;cursor:pointer;font-family:inherit;font-weight:600;padding:2px 6px;border-radius:4px}
.cat-item-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #F8FAFC;gap:10px}
.cat-item-row:last-child{border-bottom:none}
.cat-item-row:hover{background:#FAFBFF}
.cat-item-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#6D28D9;flex-shrink:0}
.cat-item-name{flex:1;font-size:13px;color:#1E293B}
.cat-qty{width:60px;border:1px solid #E2E8F0;border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;outline:none;color:#1E293B;background:#F8FAFC}
.cat-qty-label{font-size:10px;color:#94A3B8;text-align:center;margin-top:2px}
.cat-footer{padding:14px;border-top:1px solid #E2E8F0;position:sticky;bottom:0;background:#fff}
.cat-footer-info{font-size:12px;color:#64748B;margin-bottom:8px;text-align:center}
.btn-insert{background:#6D28D9;color:#fff;border:none;border-radius:9px;padding:11px 0;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-insert:hover{background:#5B21B6}
.cat-selected-count{background:#EDE9FE;color:#6D28D9;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700}
.btn-clear-cat{background:none;border:none;font-size:12px;color:#94A3B8;cursor:pointer;font-family:inherit;margin-top:6px;width:100%;padding:4px}
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:600;align-items:center;justify-content:center}
.admin-overlay.open{display:flex}
.admin-modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.admin-hd{padding:18px 22px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.admin-hd-title{font-size:16px;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:8px}
.admin-body{padding:18px 22px;display:flex;flex-direction:column;gap:16px}
.admin-section-title{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #E2E8F0;border-radius:10px;background:#FAFBFF}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-info{flex:1}
.user-name{font-size:13px;font-weight:600;color:#0F172A}
.user-login{font-size:11px;color:#64748B}
.btn-user-edit{background:none;border:1px solid #E2E8F0;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#64748B;font-family:inherit}
.btn-user-edit:hover{background:#F1F5F9}
.btn-user-del{background:none;border:1px solid #FECACA;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:#DC2626;font-family:inherit}
.btn-user-del:hover{background:#FEF2F2}
.add-user-form{border:1px solid #E2E8F0;border-radius:10px;padding:14px;background:#F8FAFC;display:flex;flex-direction:column;gap:10px}
.add-user-form-title{font-size:12px;font-weight:600;color:#0F172A}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select{border:1px solid #E2E8F0;border-radius:7px;padding:7px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;background:#fff}
.form-field input:focus,.form-field select:focus{border-color:#94A3B8}
.btn-add-user{background:#0F172A;color:#fff;border:none;border-radius:8px;padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.btn-add-user:hover{background:#1E293B}
.role-badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
@media print{
  @page{size:A4;margin:14mm 12mm}
  body{background:#fff!important}
  .app,.sidebar,.topbar,.notice,.err-box,.ai-banner,.btn-add-row,.btn-del-row,.btn-ret,.addmode-banner,.legend,.cat-overlay,.cat-panel,.admin-overlay,.login-screen{display:none!important}
  .main{display:block!important;overflow:visible!important}
  #print-zone{display:block!important}
  .card{box-shadow:none!important;break-inside:avoid;margin-bottom:8px}
  .fv{padding:0!important;max-width:100%!important;gap:8px!important}
  .btn-save,.btn-ai,.btn-print,.btn-pdf,.btn-back,.btn-ajout,.btn-catalog{display:none!important}
}
#print-zone{display:none}
.pz-header{background:#0F172A;border-radius:6px 6px 0 0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pz-header img{width:80px;border-radius:6px}
.pz-header-right{text-align:right}
.pz-header-title{font-size:14px;font-weight:700;color:#F1F5F9}
.pz-header-sub{font-size:10px;color:#64748B;margin-top:2px}
.pz-ref-bar{background:#1E293B;padding:7px 16px;display:flex;gap:20px;align-items:center;margin-bottom:10px;border-radius:0 0 6px 6px}
.pz-ref-item{display:flex;flex-direction:column}
.pz-ref-label{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.pz-ref-val{font-size:11px;color:#E2E8F0;font-weight:600}
.pz-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:10px 14px}
.pz-dates{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;border:1px solid #FDE68A;background:#FFFBEB;border-radius:6px;padding:8px 14px}
.pz-field label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#94A3B8;display:block;margin-bottom:1px}
.pz-field span{font-size:12px;font-weight:600;color:#0F172A}
.pz-section{margin-bottom:10px}
.pz-sec-title{background:#1E293B;color:#fff;padding:5px 10px;font-size:11px;font-weight:600;text-transform:uppercase;border-radius:4px 4px 0 0}
.pz-table{width:100%;border-collapse:collapse;border:1px solid #E2E8F0;border-top:none}
.pz-table th{background:#F1F5F9;padding:5px 8px;font-size:10px;text-transform:uppercase;color:#475569;text-align:left;border-bottom:1px solid #E2E8F0;font-weight:600}
.pz-table td{padding:5px 8px;font-size:11px;border-bottom:1px solid #F1F5F9}
.pz-table tr:last-child td{border-bottom:none}
.pz-obs{border:1px solid #E2E8F0;padding:8px 10px;font-size:11px;min-height:36px;white-space:pre-wrap;border-radius:0 0 4px 4px}
.pz-footer{margin-top:16px;display:flex;justify-content:flex-end;gap:36px;border-top:1px solid #E2E8F0;padding-top:10px}
.pz-sign label{font-size:9px;text-transform:uppercase;color:#94A3B8;display:block;margin-bottom:20px;text-align:center}
.pz-sign-line{border-top:1px solid #CBD5E1;width:120px;margin:0 auto}
</style>
</head>

let authToken = localStorage.getItem('appro_token');
let currentUser = null;
let sheets = [];

let fromTemplate = null;
let addMode = false;

async function apiFetch(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { doLogout(); return null; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erreur serveur');
  return data;
}

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('btn-login-submit');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2"></i> Connexion...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
    authToken = data.token;
    localStorage.setItem('appro_token', authToken);
    currentUser = data.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    await initApp();
  } catch (e) {
    errEl.textContent = 'Erreur de connexion au serveur';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> Se connecter';
  }
}

function doLogout() {
  authToken = null; currentUser = null;
  localStorage.removeItem('appro_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

async function initApp() {
  const r = ROLES[currentUser.role] || ROLES.conducteur;
  const initials = currentUser.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const av = document.getElementById('sb-avatar');
  av.style.background = r.initBg; av.style.color = r.color; av.textContent = initials;
  document.getElementById('sb-user-name').textContent = currentUser.name;
  document.getElementById('sb-user-role').textContent = r.label;
  document.getElementById('btn-new-sb').style.display = can('create') ? 'flex' : 'none';
  document.getElementById('btn-admin-panel').style.display = currentUser.role === 'admin' ? 'flex' : 'none';
  sheets = await apiFetch('GET', '/appros') || [];
  renderWelcome();
}

function can(p) { if (!currentUser) return false; const r = ROLES[currentUser.role]; return r ? r.can(p) : false; }

        <div class="form-field"><label>Nom complet</label><input type="text" id="nu-name" placeholder="Prénom Nom"/></div>
        <div class="form-field"><label>Identifiant</label><input type="text" id="nu-login" placeholder="prenom.nom"/></div>
      </div>

        <div class="form-field"><label>Mot de passe</label><input type="password" id="nu-pwd" placeholder="Minimum 6 caractères"/></div>

          <option value="conducteur">Conducteur de travaux</option>
          <option value="depot">Gestionnaire dépôt</option>
          <option value="admin">Administrateur</option>
        </select></div>
      </div>
      <button class="btn-add-user" onclick="addUser()"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px"></i> Créer le compte</button>

}

async function addUser() {
  const name = document.getElementById('nu-name').value.trim();
  const username = document.getElementById('nu-login').value.trim();
  const password = document.getElementById('nu-pwd').value;
  const role = document.getElementById('nu-role').value;
  try {
    await apiFetch('POST', '/users', { name, username, password, role });
    toast(name + ' ajouté(e)', 'ti-user-check');
    renderAdminBody();
  } catch (e) { toast(e.message, 'ti-alert-circle'); }
}
async function delUser(id) {
  if (!confirm('Supprimer cet utilisateur ?')) return;
  try { await apiFetch('DELETE', '/users/' + id); toast('Utilisateur supprimé', 'ti-trash'); renderAdminBody(); }
  catch (e) { toast(e.message, 'ti-alert-circle'); }
}
async function resetPwd(id) {
  const pwd = prompt('Nouveau mot de passe (6 caractères min.) :');
  if (!pwd) return;
  try { await apiFetch('PUT', '/users/' + id + '/password', { password: pwd }); toast('Mot de passe mis à jour', 'ti-check'); }
  catch (e) { toast(e.message, 'ti-alert-circle'); }
}

// ── UTILS ─────────────────────────────────────────────────────
function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }
function todayISO() { return new Date().toISOString().slice(0,10); }
function mkId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function mkRow(name,qty) { return {id:mkId(),designation:name||'',quantite:qty||'',disponibilite:'',addBatch:null,returned:false}; }
function mkSheet() { return {id:mkId(),reference:'REF-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*999)+1).padStart(3,'0'),noAffaire:'',nomChantier:'',chargeAffaires:'',dateAppro:'',dateChantier:'',typeChantier:'',typeConfirmed:false,additionDates:[],consommables:[mkRow(),mkRow(),mkRow()],fournitures:[mkRow(),mkRow(),mkRow()],outillage:[mkRow(),mkRow(),mkRow()],observation:'',dateCreation:new Date().toLocaleDateString('fr-FR'),dateMiseAJour:new Date().toLocaleDateString('fr-FR'),createdAt:new Date().toISOString()}; }
function pillHTML(type,confirmed) { if(!type)return''; const c=TC[type]||TC['Autre']; return `<span class="type-pill" style="background:${c.bg};color:${c.c};border-color:${c.b}"><i class="ti ${confirmed?'ti-check':'ti-bolt'}" style="font-size:11px"></i> ${escH(type)}</span>`; }
function toast(msg,icon='ti-check') { const t=document.getElementById('toast'); t.innerHTML=`<i class="ti ${icon}" style="font-size:15px"></i> ${msg}`; t.classList.add('show'); clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2800); }

// ── CATALOGUE ─────────────────────────────────────────────────
function showCatalog() {
  if (!cur||!can('catalog')) { toast('Accès non autorisé','ti-lock'); return; }
  const body = document.getElementById('cat-body');
  body.innerHTML = Object.entries(CATALOG).map(([sec,items]) => `<div class="cat-sec">
    <div class="cat-sec-hd"><div class="cat-sec-title"><i class="ti ${CAT_SEC_ICONS[sec]}" style="font-size:14px"></i> ${CAT_SEC_LABELS[sec]}</div>
    <button class="btn-select-all" onclick="selectAllCat('${sec}')">Tout cocher</button></div>
    ${items.map((item,i) => `<div class="cat-item-row">
      <input type="checkbox" id="ci_${sec}_${i}" class="cat-cb" data-section="${sec}" data-name="${escH(item.name)}" onchange="updateCatCount()"/>
      <label for="ci_${sec}_${i}" class="cat-item-name" style="cursor:pointer">${escH(item.name)}</label>
      <div style="display:flex;flex-direction:column;align-items:center">
        <input type="number" id="cq_${sec}_${i}" class="cat-qty" value="${item.qty}" min="1"/>
        <div class="cat-qty-label">qté</div>
      </div></div>`).join('')}</div>`).join('');
  updateCatCount();
  document.getElementById('cat-overlay').style.display = 'block';
  document.getElementById('cat-panel').classList.add('open');
}
function hideCatalog() { document.getElementById('cat-overlay').style.display='none'; document.getElementById('cat-panel').classList.remove('open'); }
function selectAllCat(sec) { document.querySelectorAll(`.cat-cb[data-section="${sec}"]`).forEach(cb=>cb.checked=true); updateCatCount(); }
function clearCatalogSelection() { document.querySelectorAll('.cat-cb').forEach(cb=>cb.checked=false); updateCatCount(); }
function updateCatCount() { const n=document.querySelectorAll('.cat-cb:checked').length; document.getElementById('cat-sel-count').textContent=n; document.getElementById('cat-footer-info').textContent=n===0?'Sélectionnez des articles':`${n} article${n>1?'s':''} sélectionné${n>1?'s':''}`; }
function insertFromCatalog() {
  const checked = document.querySelectorAll('.cat-cb:checked');
  if (!checked.length) { toast('Aucun article sélectionné','ti-alert-circle'); return; }
  let count = 0;
  checked.forEach(cb => {
    const sec = cb.dataset.section; const name = cb.dataset.name;
    const allCbs = Array.from(document.querySelectorAll(`.cat-cb[data-section="${sec}"]`));
    const idx = allCbs.indexOf(cb);
    const qty = (document.getElementById(`cq_${sec}_${idx}`)||{value:'1'}).value;
    const row = mkRow(name, qty);
    if (addMode&&addModeDate) { row.addBatch=addModeDate; if(!cur.additionDates)cur.additionDates=[]; if(!cur.additionDates.includes(addModeDate))cur.additionDates.push(addModeDate); }
    if (cur[sec].length&&!cur[sec][cur[sec].length-1].designation) cur[sec].splice(cur[sec].length-1,1);
    cur[sec].push(row); count++;
  });
  saved = false; hideCatalog(); renderForm();
  toast(`${count} article${count>1?'s':''} inséré${count>1?'s':''}`, 'ti-circle-check');
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = sheets.filter(s => !q || [s.nomChantier,s.typeChantier,s.noAffaire,s.chargeAffaires].some(f=>(f||'').toLowerCase().includes(q)));
  const groups = {};
  filtered.forEach(s => { const k=s.typeChantier||'__none__'; if(!groups[k])groups[k]=[]; groups[k].push(s); });
  const sortedKeys = [...WT.filter(t=>groups[t]),'__none__'].filter(k=>groups[k]);
  let html = '';
  if (!filtered.length) { html = `<div class="sb-empty">${q?'Aucun résultat':'Aucune appro<br>enregistrée'}</div>`; }
  else sortedKeys.forEach(key => {
    const list=groups[key], isNone=key==='__none__';
    const label=isNone?'Non classifiés':key;
    const cl=isNone?{dot:'#CBD5E1'}:(TC[key]||TC['Autre']);
    const catId='cat_'+key.replace(/[^a-z0-9]/gi,'_');
    const isOpen=openCats[key]!==false;
    html += `<div class="cat-group">
      <div class="cat-header" onclick="toggleCat('${key}')">
        <span class="cat-dot" style="background:${cl.dot}"></span>
        <span class="cat-label">${escH(label)}</span><span class="cat-count">${list.length}</span>
        <i class="ti ti-chevron-right cat-arrow${isOpen?' open':''}" id="${catId}_arrow"></i>
      </div>
      <div class="cat-cards" id="${catId}_cards" style="display:${isOpen?'flex':'none'};flex-direction:column;gap:4px">
        ${list.map(s => {
          const active=cur&&cur.id===s.id?' active':'';
          const hasAj=s.additionDates&&s.additionDates.length>0;
          return `<div class="sheet-card${active}" onclick="openSheet('${s.id}')">
            <div class="sc-name">${escH(s.nomChantier)||'Sans titre'}</div>
            <div class="sc-foot"><span style="font-size:10px;color:#94A3B8">${s.noAffaire||'—'}</span>
              <div style="display:flex;gap:4px;align-items:center">
                ${hasAj?`<span style="font-size:10px;background:#EFF6FF;color:#1D4ED8;padding:1px 5px;border-radius:4px">${s.additionDates.length} ajout${s.additionDates.length>1?'s':''}</span>`:''}
                <span style="font-size:10px;color:#94A3B8">${s.dateCreation}</span>
              </div></div>
            <div class="sc-acts">
              ${can('create')?`<button class="sc-btn sc-btn-base" onclick="event.stopPropagation();takeAsBase('${s.id}')"><i class="ti ti-copy" style="font-size:11px"></i> Prendre comme base</button>`:''}
              ${can('delete')?`<button class="sc-btn sc-btn-del" onclick="event.stopPropagation();delSheet('${s.id}')"><i class="ti ti-trash" style="font-size:11px"></i></button>`:''}
            </div></div>`;
        }).join('')}
      </div></div>`;
  });
  document.getElementById('sheets-list').innerHTML = html;
}
function toggleCat(key) { openCats[key]=openCats[key]===false; const catId='cat_'+key.replace(/[^a-z0-9]/gi,'_'); const cards=document.getElementById(catId+'_cards'); const arrow=document.getElementById(catId+'_arrow'); if(cards)cards.style.display=openCats[key]?'none':'flex'; if(arrow)arrow.classList.toggle('open',!openCats[key]); }

// ── TABLE ─────────────────────────────────────────────────────
function tableHTML(sec) {
  const rows=cur[sec]; const ro=!can('edit');
  const rowsHTML=rows.map((r,i)=>{
    const addIdx=r.addBatch?(cur.additionDates||[]).indexOf(r.addBatch):-1;
    const ac=addIdx>=0?AP[addIdx%AP.length]:null;
    const isRet=r.returned===true;
    const rowBg=isRet?'#FFF5F5':(ac?ac.bg:'');
    const leftB=isRet?'3px solid #EF4444':(ac?`3px solid ${ac.left}`:'none');
    const strike=isRet?'text-decoration:line-through;color:#EF4444;':'';
    return `<tr class="tr" style="background:${rowBg}">
      <td style="border-left:${leftB}"><input class="cin" value="${escH(r.designation)}" placeholder="Désignation..." oninput="upRow('${sec}',${i},'designation',this.value)" ${ro?'readonly':''} style="${strike}"/></td>
      <td><input class="cin" value="${escH(r.quantite)}" placeholder="0" style="text-align:center;${strike}" oninput="upRow('${sec}',${i},'quantite',this.value)" ${ro?'readonly':''}/></td>
      <td><select class="csel" onchange="upRow('${sec}',${i},'disponibilite',this.value)" ${ro?'disabled':''} style="${strike}">
        <option value="">—</option>${DIS.map(d=>`<option value="${d}"${r.disponibilite===d?' selected':''}>${d}</option>`).join('')}
      </select></td>
      <td style="text-align:center;padding:0 4px">
        ${(can('return')||can('edit'))?`<button class="btn-ret${isRet?' returned':''}" onclick="toggleReturn('${sec}',${i})" title="${isRet?'Annuler retour':'Retour au dépôt'}"><i class="ti ti-arrow-back-up" style="font-size:12px;pointer-events:none"></i>${isRet?'<span style="font-size:10px">Rendu</span>':''}</button>`:'—'}
      </td>
      <td style="text-align:center;padding:0 4px">
        ${can('edit')?`<button class="btn-del-row" onclick="delRow('${sec}',${i})"><i class="ti ti-trash" style="font-size:13px;pointer-events:none"></i></button>`:''}
      </td></tr>`;
  }).join('');
  const addLabel=addMode?` <span style="font-size:10px;background:${AP[(cur.additionDates||[]).indexOf(addModeDate)%AP.length]?.left||AP[0].left};color:#fff;padding:1px 6px;border-radius:4px">Ajout ${fmtDate(addModeDate)}</span>`:'';
  return `<div class="tbl-wrap"><table class="at"><thead><tr><th class="th-d">Désignation</th><th class="th-q">Quantité</th><th class="th-av">Disponibilité</th><th class="th-ret" title="Retour dépôt"><i class="ti ti-building-warehouse" style="font-size:12px"></i></th><th class="th-x"></th></tr></thead><tbody>${rowsHTML}</tbody></table></div>
  ${can('edit')?`<button class="btn-add-row" onclick="addRow('${sec}')"><i class="ti ti-plus" style="font-size:13px"></i> Ajouter une ligne${addLabel}</button>`:''}`;
}
function legendHTML() {
  const dates=cur.additionDates||[];
  const hasRet=[...cur.consommables,...cur.fournitures,...cur.outillage].some(r=>r.returned);
  if(!dates.length&&!hasRet)return'';
  let h=`<div class="legend"><span style="font-size:11px;color:#94A3B8;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Légende :</span><span class="leg-item"><span class="leg-swatch" style="background:#F8FAFC;border-color:#CBD5E1"></span> Original</span>`;
  dates.forEach((d,i)=>{const c=AP[i%AP.length];h+=`<span class="leg-item"><span class="leg-swatch" style="background:${c.bg};border-color:${c.left}"></span> Ajout du ${fmtDate(d)} (${c.label})</span>`;});
  if(hasRet)h+=`<span class="leg-item"><span class="leg-swatch" style="background:#FEE2E2;border-color:#FECACA"></span> Retourné au dépôt</span>`;
  return h+'</div>';
}

// ── FORM ──────────────────────────────────────────────────────
function renderForm() {
  const aidx=addMode?(cur.additionDates||[]).indexOf(addModeDate):-1;
  const ac=aidx>=0?AP[aidx%AP.length]:AP[0]; const ro=!can('edit');
  const addBtn=can('ajout')?(addMode?`<button class="btn-ajout active" style="background:${ac.left};border-color:${ac.left}" onclick="toggleAddMode()"><i class="ti ti-pencil" style="font-size:13px"></i> Fin d'ajout</button>`:`<button class="btn-ajout" onclick="toggleAddMode()"><i class="ti ti-circle-plus" style="font-size:13px"></i> Mode Ajout</button>`):'';
  const addBanner=addMode?`<div class="addmode-banner" style="background:${ac.bg};border-color:${ac.left}"><div style="display:flex;align-items:center;gap:10px"><span style="width:10px;height:10px;border-radius:50%;background:${ac.left};flex-shrink:0;display:inline-block"></span><div><strong style="font-size:13px;color:${ac.text}">Mode Ajout actif</strong><div style="font-size:11px;color:${ac.text};opacity:.8">Nouvelles lignes en ${ac.label} — ${fmtDate(addModeDate)}</div></div></div><button style="background:rgba(0,0,0,.12);border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:${ac.text}" onclick="toggleAddMode()">Terminer</button></div>`:'';
  const tplNotice=fromTemplate?`<div class="notice"><i class="ti ti-copy" style="font-size:15px"></i> Basée sur <strong style="margin-left:3px">${escH(fromTemplate)}</strong> — l'original n'a pas été modifié</div>`:'';
  const saveBtn=can('edit')?(saved?`<button class="btn-save saved" disabled><i class="ti ti-check"></i> Enregistré</button>`:`<button class="btn-save" onclick="doSave()">Enregistrer</button>`):'';
  const aiBanner=aiSuggestion&&!cur.typeConfirmed?`<div class="ai-banner"><div class="ai-left"><span style="font-size:22px">🤖</span><div><div class="ai-sug-lbl">Suggestion IA</div><div class="ai-sug-type">${escH(aiSuggestion.typeChantier)}</div><div class="ai-conf">Confiance : ${Math.round(aiSuggestion.confidence*100)}%</div><div class="ai-just">${escH(aiSuggestion.justification)}</div></div></div><div class="ai-right"><button class="btn-confirm" onclick="confirmAI()"><i class="ti ti-check"></i> Confirmer</button><button class="btn-dismiss" onclick="dismissAI()">✕</button></div></div>`:'';
  const aiErr=window._aiErr?`<div class="err-box"><i class="ti ti-alert-circle" style="font-size:14px"></i> ${escH(window._aiErr)}</div>`:'';

function toggleAddMode() { if(!can('ajout'))return; addMode=!addMode; if(addMode){addModeDate=todayISO();if(!cur.additionDates)cur.additionDates=[];if(!cur.additionDates.includes(addModeDate)){cur.additionDates.push(addModeDate);saved=false;}toast('Mode Ajout activé — '+AP[(cur.additionDates.indexOf(addModeDate))%AP.length].label,'ti-circle-plus');}else toast('Mode Ajout terminé','ti-check'); renderForm(); }
function toggleReturn(sec,i) { if(!can('return')&&!can('edit'))return; cur[sec][i].returned=!cur[sec][i].returned; saved=false; renderForm(); toast(cur[sec][i].returned?'Retourné au dépôt':'Retour annulé',cur[sec][i].returned?'ti-arrow-back-up':'ti-refresh'); }
function upF(f,v) { if(!cur||!can('edit'))return; cur[f]=v; cur.dateMiseAJour=new Date().toLocaleDateString('fr-FR'); saved=false; if(f==='typeChantier')cur.typeConfirmed=true; const pill=document.getElementById('type-pill-zone'); if(pill)pill.innerHTML=pillHTML(cur.typeChantier,cur.typeConfirmed); const dm=document.getElementById('datemaj'); if(dm)dm.textContent=cur.dateMiseAJour; const sb=document.querySelector('.btn-save'); if(sb&&sb.classList.contains('saved')){sb.innerHTML='Enregistrer';sb.classList.remove('saved');sb.disabled=false;sb.onclick=doSave;} }
function upRow(sec,i,field,val) { if(!cur||!can('edit'))return; cur[sec][i][field]=val; cur.dateMiseAJour=new Date().toLocaleDateString('fr-FR'); saved=false; const cnt=cur[sec].filter(r=>r.designation).length; const heads=document.querySelectorAll('.card-hd-count'); const idx=['consommables','fournitures','outillage'].indexOf(sec); if(heads[idx])heads[idx].textContent=`${cnt} article${cnt!==1?'s':''}`; }
function addRow(sec) { if(!cur||!can('edit'))return; const row=mkRow(); if(addMode&&addModeDate){row.addBatch=addModeDate;if(!cur.additionDates)cur.additionDates=[];if(!cur.additionDates.includes(addModeDate))cur.additionDates.push(addModeDate);} cur[sec].push(row); renderForm(); }
function delRow(sec,i) { if(!cur||!can('edit'))return; cur[sec].splice(i,1); if(!cur[sec].length)cur[sec].push(mkRow()); renderForm(); }
function manualType(t) { if(!cur||!can('edit'))return; cur.typeChantier=t; cur.typeConfirmed=true; aiSuggestion=null; saved=false; renderForm(); }
async function classify() {
  if(!can('edit'))return;
  const btn=document.getElementById('btn-ai'); if(!btn||!cur)return;
  const items=[...cur.consommables,...cur.fournitures,...cur.outillage].map(r=>r.designation).filter(Boolean);
  if(!items.length){window._aiErr='Ajoutez des articles avant de classifier.';renderForm();return;}
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2" style="font-size:13px"></i> Analyse...'; window._aiErr=null;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`Expert BTP cordiste. Type parmi: ${WT.join(', ')}.\nChantier: "${cur.nomChantier||'non précisé'}", Articles: ${items.join(', ')}\nJSON uniquement: {"typeChantier":"...","confidence":0.95,"justification":"..."}`}]})});
    const d=await res.json(); const txt=d.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    aiSuggestion=JSON.parse(txt.replace(/```json|```/g,'').trim()); cur.typeChantier=aiSuggestion.typeChantier; cur.typeConfirmed=false;
  } catch(e){window._aiErr=e.message||'Erreur IA';}
  renderForm();
}
function confirmAI() { if(!cur||!aiSuggestion)return; cur.typeConfirmed=true; aiSuggestion=null; renderForm(); }
function dismissAI() { aiSuggestion=null; renderForm(); }

// ── CRUD ──────────────────────────────────────────────────────
function openNew() { if(!can('create'))return; cur=mkSheet(); saved=false; aiSuggestion=null; window._aiErr=null; fromTemplate=null; addMode=false; addModeDate=null; renderForm(); }
function takeAsBase(id) {
  if(!can('create'))return;
  const tpl=sheets.find(x=>x.id===id); if(!tpl)return;
  const s=mkSheet();
  s.consommables=tpl.consommables.map(r=>({...r,id:mkId(),addBatch:null,returned:false}));
  s.fournitures=tpl.fournitures.map(r=>({...r,id:mkId(),addBatch:null,returned:false}));
  s.outillage=tpl.outillage.map(r=>({...r,id:mkId(),addBatch:null,returned:false}));
  s.typeChantier=tpl.typeChantier; s.typeConfirmed=tpl.typeConfirmed;
  fromTemplate=tpl.nomChantier||'appro précédente';
  cur=s; saved=false; aiSuggestion=null; window._aiErr=null; addMode=false; addModeDate=null;
  renderForm(); toast("Nouvelle appro créée — l'original est intact",'ti-copy');
}
function openSheet(id) { const s=sheets.find(x=>x.id===id); if(!s)return; cur=JSON.parse(JSON.stringify(s)); saved=false; aiSuggestion=null; fromTemplate=null; window._aiErr=null; addMode=false; addModeDate=null; renderForm(); }
async function delSheet(id) {
  if(!can('delete'))return;
  if(!confirm('Supprimer cette appro définitivement ?'))return;
  await apiFetch('DELETE','/appros/'+id);
  sheets=sheets.filter(s=>s.id!==id);
  if(cur&&cur.id===id)renderWelcome(); else renderList();
  toast('Appro supprimée','ti-trash');
}
async function doSave() {
  if(!cur||!can('edit'))return;
  try {
    const isNew=!sheets.find(s=>s.id===cur.id);
    if(isNew) { const created=await apiFetch('POST','/appros',cur); sheets.push(created||cur); }
    else { await apiFetch('PUT','/appros/'+cur._id,cur); const i=sheets.findIndex(s=>s.id===cur.id); if(i>=0)sheets[i]=JSON.parse(JSON.stringify(cur)); }
    saved=true; fromTemplate=null;
    const sb=document.querySelector('.btn-save'); if(sb){sb.innerHTML='<i class="ti ti-check"></i> Enregistré';sb.classList.add('saved');sb.disabled=true;}
    renderList(); toast('Appro enregistrée');
  } catch(e) { toast('Erreur enregistrement: '+e.message,'ti-alert-circle'); }
}

function doPDF() {
  if(!cur){toast('Ouvrez une appro','ti-alert-circle');return;}
  const h=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>${escH(cur.nomChantier||'Appro')} — JARNIAS</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1E293B;font-size:11px}
  .pz-header{background:#0F172A;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}.pz-header img{width:72px;border-radius:6px}
  .pz-header-right{text-align:right}.pz-header-title{font-size:14px;font-weight:700;color:#F1F5F9}.pz-header-sub{font-size:10px;color:#64748B;margin-top:2px}
  .pz-ref-bar{background:#1E293B;padding:7px 16px;display:flex;gap:20px;margin-bottom:10px}
  .pz-ref-item{display:flex;flex-direction:column}.pz-ref-label{font-size:9px;color:#64748B;text-transform:uppercase}.pz-ref-val{font-size:11px;color:#E2E8F0;font-weight:600}
  .pz-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:10px 14px}
  .pz-dates{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;border:1px solid #FDE68A;background:#FFFBEB;border-radius:6px;padding:8px 14px}
  .pz-field label{font-size:9px;text-transform:uppercase;color:#94A3B8;display:block;margin-bottom:1px}.pz-field span{font-size:12px;font-weight:600;color:#0F172A}
  .pz-section{margin-bottom:10px}.pz-sec-title{background:#1E293B;color:#fff;padding:5px 10px;font-size:11px;font-weight:600;text-transform:uppercase;border-radius:4px 4px 0 0}
  .pz-table{width:100%;border-collapse:collapse;border:1px solid #E2E8F0;border-top:none}
  .pz-table th{background:#F1F5F9;padding:5px 8px;font-size:10px;text-transform:uppercase;color:#475569;text-align:left;border-bottom:1px solid #E2E8F0;font-weight:600}
  .pz-table td{padding:5px 8px;font-size:11px;border-bottom:1px solid #F1F5F9}.pz-table tr:last-child td{border-bottom:none}
  .pz-obs{border:1px solid #E2E8F0;padding:8px 10px;font-size:11px;white-space:pre-wrap;border-radius:0 0 4px 4px}
  .pz-footer{margin-top:16px;display:flex;justify-content:flex-end;gap:36px;border-top:1px solid #E2E8F0;padding-top:10px}
  .pz-sign label{font-size:9px;text-transform:uppercase;color:#94A3B8;display:block;margin-bottom:20px;text-align:center}
  .pz-sign-line{border-top:1px solid #CBD5E1;width:120px;margin:0 auto}
  @media print{@page{size:A4;margin:10mm 12mm}}</style></head><body>${buildPrintHTML(cur)}<script>window.onload=function(){window.print();}<\/script></body></html>`;
  const blob=new Blob([h],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank','width=820,height=900');
  if(!win)toast('Autorisez les popups pour le PDF','ti-alert-circle');
  else toast('Fenêtre PDF — choisissez Enregistrer en PDF','ti-file-type-pdf');
}

// ── INIT ─────────────────────────────────────────────────────
(async function() {
  if (authToken) {
    try {
      const res = await fetch('/api/auth/refresh', { headers: { 'Authorization': 'Bearer ' + authToken } });
      if (res.ok) {
        const data = await res.json();
        authToken = data.token;
        localStorage.setItem('appro_token', authToken);
        const payload = JSON.parse(atob(authToken.split('.')[1]));
        currentUser = { id: payload.id, username: payload.username, role: payload.role, name: payload.name };
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        await initApp();
        return;
      }
    } catch {}
    localStorage.removeItem('appro_token');
  }
})();
</script>
