<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AppROVISIO — JARNIAS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F9;color:#1E293B;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:272px;min-width:272px;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden}
.sb-brand{background:#0F172A;padding:14px 16px;display:flex;align-items:center;gap:10px}
.sb-brand img{width:72px;border-radius:8px}
.sb-brand-name{font-size:13px;font-weight:700;color:#F1F5F9}
.sb-brand-tag{font-size:10px;color:#64748B;margin-top:1px}
.sb-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.sb-search{width:100%;border:1px solid #E2E8F0;border-radius:8px;padding:7px 11px;font-size:13px;color:#1E293B;outline:none;background:#F8FAFC;font-family:inherit}
.btn-new-sb{background:#EFF6FF;border:none;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;color:#1D4ED8;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:7px;font-family:inherit}
.btn-new-sb:hover{background:#DBEAFE}
.cat-group{display:flex;flex-direction:column;gap:4px}
.cat-hd{display:flex;align-items:center;gap:6px;padding:6px 4px;cursor:pointer;user-select:none;border-radius:6px}.cat-hd:hover{background:#F8FAFC}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#64748B;flex:1}
.cat-cnt{font-size:10px;color:#94A3B8;background:#F1F5F9;padding:1px 6px;border-radius:8px}
.cat-arr{font-size:11px;color:#CBD5E1;transition:transform .2s}
.cat-arr.open{transform:rotate(90deg)}
.cat-cards{display:flex;flex-direction:column;gap:4px;padding-left:6px;border-left:2px solid #F1F5F9}
.sc{border:1px solid #E2E8F0;border-radius:8px;padding:10px 11px;cursor:pointer;background:#FAFBFF;transition:border-color .15s}
.sc:hover{border-color:#94A3B8}
.sc.active{border-color:#3B82F6;background:#EFF6FF}
.sc-name{font-size:13px;font-weight:600;color:#0F172A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.sc-acts{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.sc-btn{background:#fff;border:1px solid #E2E8F0;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;color:#64748B;font-family:inherit;display:inline-flex;align-items:center;gap:3px}
.sc-btn:hover{background:#F1F5F9}
.sc-btn-base{color:#1D4ED8;border-color:#BFDBFE;background:#EFF6FF}
.sc-btn-base:hover{background:#DBEAFE}
.sc-btn-del:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}
.sb-empty{color:#94A3B8;font-size:13px;text-align:center;padding:24px 0;line-height:1.6}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F172A;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast.show{opacity:1}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 40px;text-align:center;min-height:calc(100vh - 52px)}
.welcome h1{font-size:24px;font-weight:700;color:#0F172A}
.welcome p{color:#64748B;font-size:15px}
.stats-row{display:flex;gap:10px;margin-top:4px}
.stat-box{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:12px 22px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:#0F172A}
.stat-lbl{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px}
.type-bars{width:100%;max-width:360px}
.type-bars h3{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.tbr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tbr-lbl{width:150px;font-size:12px;color:#64748B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbr-bg{flex:1;background:#E2E8F0;border-radius:3px;height:5px}
.tbr-fill{height:5px;border-radius:3px}
.tbr-n{font-size:11px;color:#94A3B8;width:14px;text-align:right}
.btn-cta{background:#0F172A;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;margin-top:8px}
.btn-cta:hover{background:#1E293B}
.fv{padding:20px 24px;display:flex;flex-direction:column;gap:12px;max-width:960px;margin:0 auto;width:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tb-right{display:flex;gap:6px;flex-wrap:wrap}
.btn-back{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:7px 13px;font-size:13px;color:#64748B;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.btn-ai{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#92400E;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-ai:hover:not(:disabled){background:#FEF3C7}
.btn-ai:disabled{opacity:.6;cursor:default}
.btn-cat{background:#F5F3FF;border:1px solid #C4B5FD;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#6D28D9;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-cat:hover{background:#EDE9FE}
.btn-add{background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#15803D;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-add:hover{background:#DCFCE7}
.btn-add.active{color:#fff;border-color:transparent}
.btn-print{background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-print:hover{background:#E2E8F0}
.btn-pdf{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:#B91C1C;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-pdf:hover{background:#FEE2E2}
.btn-save{background:#10B981;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-save:hover:not(:disabled){background:#059669}
.btn-save.saved{background:#D1FAE5;color:#065F46;cursor:default}
.notice{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:9px 14px;font-size:13px;color:#1D4ED8;display:flex;align-items:center;gap:8px}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 14px;font-size:13px;color:#B91C1C;display:flex;align-items:center;gap:6px}
.add-banner{border-radius:10px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid}
.legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:6px 0}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748B}
.leg-sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.1)}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center}
.card-hd-t{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#0F172A}
.card-hd-n{font-size:11px;background:#F1F5F9;color:#64748B;padding:2px 9px;border-radius:10px}
.doc-band{background:#0F172A;padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.doc-band img{width:80px;border-radius:8px}
.doc-band-r{text-align:right}
.doc-band-title{font-size:14px;font-weight:700;color:#F1F5F9}
.doc-band-sub{font-size:10px;color:#64748B;margin-top:2px}
.doc-meta{display:flex;gap:18px;padding:10px 18px;border-bottom:1px solid #F1F5F9;flex-wrap:wrap}
.dm label{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:2px}
.dm-val{font-size:12px;color:#334155}
.dm-in{background:transparent;border:none;border-bottom:1px solid #E2E8F0;color:#334155;font-size:12px;font-family:inherit;outline:none;width:115px;padding:1px 0}
.card-fields{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;font-weight:600}.fg-full{grid-column:1/-1}.fg-full{grid-column:1/-1}
.fin{width:100%;border:1px solid #E2E8F0;border-radius:7px;padding:8px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;background:#F8FAFC}
.fin:focus{border-color:#94A3B8;background:#fff}
.ai-banner{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.ai-l{display:flex;gap:12px;align-items:flex-start}
.ai-lbl{font-size:10px;color:#92400E;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.ai-type{font-size:19px;font-weight:700;color:#78350F;margin:2px 0}
.ai-conf{font-size:12px;color:#B45309}
.ai-just{font-size:12px;color:#92400E;font-style:italic;margin-top:3px}
.ai-r{display:flex;gap:7px;flex-shrink:0}
.btn-ok{background:#10B981;border:none;border-radius:7px;padding:8px 15px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
.btn-ok:hover{background:#059669}
.btn-no{background:none;border:1px solid #FDE68A;border-radius:7px;padding:8px 11px;font-size:13px;cursor:pointer;color:#92400E;font-family:inherit}
.tbl-wrap{overflow-x:auto}
table.at{width:100%;border-collapse:collapse;font-size:13px}
table.at thead tr{background:#F8FAFC;border-bottom:2px solid #E2E8F0}
table.at th{padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748B;font-weight:600;text-align:left}
.th-d{width:44%}.th-q{width:13%}.th-av{width:22%}.th-r{width:52px;text-align:center!important}.th-x{width:36px}
table.at tr.tr{border-bottom:1px solid #F1F5F9}
table.at tr.tr:last-child{border-bottom:none}
table.at td{padding:0}
.cin{width:100%;background:none;border:none;padding:8px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none}
.cin::placeholder{color:#CBD5E1}
.csel{width:100%;background:none;border:none;padding:8px 10px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;cursor:pointer}
.btn-ret{background:none;border:1px solid #E2E8F0;color:#94A3B8;cursor:pointer;padding:3px 6px;border-radius:5px;font-size:12px;line-height:1;display:inline-flex;align-items:center;gap:3px}
.btn-ret:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}
.btn-ret.ret{background:#FEE2E2;border-color:#FECACA;color:#B91C1C}
.btn-del{background:none;border:none;color:#CBD5E1;cursor:pointer;padding:4px 6px;border-radius:4px;line-height:1}
.btn-del:hover{color:#EF4444;background:#FEF2F2}
.btn-add-row{background:none;border:none;color:#64748B;font-size:12px;cursor:pointer;padding:8px 16px;font-family:inherit;display:flex;align-items:center;gap:6px;border-top:1px solid #F1F5F9;width:100%}
.btn-add-row:hover{color:#1E293B;background:#F8FAFC}
.obs-ta{width:100%;background:none;border:none;padding:13px 18px;font-size:13px;color:#1E293B;font-family:inherit;outline:none;resize:vertical;min-height:80px}
.obs-ta::placeholder{color:#CBD5E1}
.type-pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;border:1px solid transparent}
.cp-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:500}
.cp-panel{display:none;position:fixed;right:0;top:0;bottom:0;width:400px;background:#fff;z-index:501;overflow-y:auto;border-left:1px solid #E2E8F0;flex-direction:column}
.cp-panel.open{display:flex}
.cp-hd{padding:16px 18px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.cp-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#0F172A}
.btn-cp-close{background:none;border:1px solid #E2E8F0;border-radius:8px;padding:5px 8px;cursor:pointer;color:#64748B;line-height:1}
.cp-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:14px}
.cp-sec{border:1px solid #E2E8F0;border-radius:10px;overflow:hidden}
.cp-sec-hd{background:#F8FAFC;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E2E8F0}
.cp-sec-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#0F172A;text-transform:uppercase;letter-spacing:.5px}
.btn-all{background:none;border:none;font-size:11px;color:#6D28D9;cursor:pointer;font-family:inherit;font-weight:600;padding:2px 6px;border-radius:4px}
.cp-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #F8FAFC;gap:10px}
.cp-row:last-child{border-bottom:none}
.cp-row:hover{background:#FAFBFF}
.cp-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#6D28D9;flex-shrink:0}
.cp-row-n{flex:1;font-size:13px;color:#1E293B}
.cp-qty{width:60px;border:1px solid #E2E8F0;border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;outline:none;background:#F8FAFC}
.cp-qty-l{font-size:10px;color:#94A3B8;text-align:center;margin-top:2px}
.cp-foot{padding:14px;border-top:1px solid #E2E8F0;position:sticky;bottom:0;background:#fff}
.cp-info{font-size:12px;color:#64748B;margin-bottom:8px;text-align:center}
.btn-ins{background:#6D28D9;color:#fff;border:none;border-radius:9px;padding:11px 0;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-ins:hover{background:#5B21B6}
.cp-n-sel{background:#EDE9FE;color:#6D28D9;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700}
.btn-clr{background:none;border:none;font-size:12px;color:#94A3B8;cursor:pointer;font-family:inherit;margin-top:6px;width:100%;padding:4px}
@media print{
  @page{size:A4;margin:14mm 12mm}
  body{background:#fff!important}
  .app,.sidebar,.topbar,.notice,.err-box,.ai-banner,.btn-add-row,.btn-del,.btn-ret,.add-banner,.legend,.cp-overlay,.cp-panel{display:none!important}
  .main{display:block!important;overflow:visible!important}
  #pz{display:block!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid;margin-bottom:8px}
  .fv{padding:0!important;max-width:100%!important;gap:8px!important}
  .btn-save,.btn-ai,.btn-print,.btn-pdf,.btn-back,.btn-add,.btn-cat{display:none!important}
}
#pz{display:none}
.pz-hd{background:#0F172A;border-radius:6px 6px 0 0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pz-hd img{width:76px;border-radius:6px}
.pz-hd-r{text-align:right}
.pz-hd-title{font-size:14px;font-weight:700;color:#F1F5F9}
.pz-hd-sub{font-size:10px;color:#64748B;margin-top:2px}
.pz-ref{background:#1E293B;padding:7px 16px;display:flex;gap:20px;margin-bottom:10px;border-radius:0 0 6px 6px}
.pz-ri{display:flex;flex-direction:column}
.pz-rl{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.pz-rv{font-size:11px;color:#E2E8F0;font-weight:600}
.pz-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:10px 14px}
.pz-dates{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;border:1px solid #FDE68A;background:#FFFBEB;border-radius:6px;padding:8px 14px}
.pz-fi label{font-size:9px;text-transform:uppercase;color:#94A3B8;display:block;margin-bottom:1px}
.pz-fi span{font-size:12px;font-weight:600;color:#0F172A}
.pz-sec{margin-bottom:10px}
.pz-sec-t{background:#1E293B;color:#fff;padding:5px 10px;font-size:11px;font-weight:600;text-transform:uppercase;border-radius:4px 4px 0 0}
.pz-tbl{width:100%;border-collapse:collapse;border:1px solid #E2E8F0;border-top:none}
.pz-tbl th{background:#F1F5F9;padding:5px 8px;font-size:10px;text-transform:uppercase;color:#475569;text-align:left;border-bottom:1px solid #E2E8F0;font-weight:600}
.pz-tbl td{padding:5px 8px;font-size:11px;border-bottom:1px solid #F1F5F9}
.pz-tbl tr:last-child td{border-bottom:none}
.pz-obs{border:1px solid #E2E8F0;padding:8px 10px;font-size:11px;min-height:36px;white-space:pre-wrap;border-radius:0 0 4px 4px}
.pz-foot{margin-top:16px;display:flex;justify-content:flex-end;gap:36px;border-top:1px solid #E2E8F0;padding-top:10px}
.pz-sign label{font-size:9px;text-transform:uppercase;color:#94A3B8;display:block;margin-bottom:20px;text-align:center}
.pz-sign-line{border-top:1px solid #CBD5E1;width:120px;margin:0 auto}

.tabs-bar{display:flex;gap:2px;background:#fff;border-bottom:1px solid #E2E8F0;padding:0 16px;flex-shrink:0}
.tab-btn{background:none;border:none;padding:13px 18px;font-size:13px;font-weight:600;color:#64748B;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;margin-bottom:-1px}
.tab-btn:hover{color:#1E293B}
.tab-btn.active{color:#0F172A;border-bottom-color:#0F172A}
.tab-btn .tab-badge{background:#F1F5F9;color:#64748B;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:700}
.lib-wrap{padding:20px 24px;max-width:1000px;margin:0 auto;width:100%}
.lib-search{width:100%;border:1px solid #E2E8F0;border-radius:9px;padding:10px 14px;font-size:14px;color:#1E293B;outline:none;background:#fff;font-family:inherit;margin-bottom:18px}
.lib-search:focus{border-color:#94A3B8}
.lib-sec{margin-bottom:22px}
.lib-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #F1F5F9}
.lib-sec-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.lib-sec-title{font-size:15px;font-weight:700;color:#0F172A}
.lib-sec-n{font-size:11px;color:#94A3B8;background:#F1F5F9;padding:2px 8px;border-radius:8px}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.lib-card{border:1px solid #E2E8F0;border-radius:12px;padding:14px;background:#fff;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.lib-card:hover{border-color:#94A3B8;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lib-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.lib-card-name{font-size:14px;font-weight:600;color:#0F172A;line-height:1.3}
.lib-card-cond{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748B;margin-bottom:10px}
.lib-card-cond .cond-av{width:22px;height:22px;border-radius:50%;background:#E2E8F0;color:#475569;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.lib-card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #F1F5F9}
.lib-card-meta{font-size:11px;color:#94A3B8}
.lib-empty{text-align:center;padding:60px 20px;color:#94A3B8}

.depot-wrap{display:flex;gap:16px;padding:20px 24px;align-items:flex-start}
.depot-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}
.depot-col-hd{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px}
.depot-col-hd .dch-n{margin-left:auto;font-size:12px;background:rgba(255,255,255,.5);padding:2px 9px;border-radius:10px}
.depot-card{border:1px solid #E2E8F0;border-radius:11px;padding:13px;background:#fff;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.depot-card:hover{border-color:#94A3B8;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.depot-card-name{font-size:14px;font-weight:600;color:#0F172A;margin-bottom:4px}
.depot-card-sub{font-size:11px;color:#94A3B8;margin-bottom:8px}
.depot-card-items{background:#F8FAFC;border-radius:7px;padding:7px 9px;margin-bottom:10px;font-size:11px;color:#475569;line-height:1.6}
.depot-btn{width:100%;border:none;border-radius:8px;padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.depot-btn-prep{background:#D1FAE5;color:#065F46}
.depot-btn-prep:hover{background:#A7F3D0}
.depot-btn-rendu{background:#DBEAFE;color:#1D4ED8}
.depot-btn-rendu:hover{background:#BFDBFE}
.depot-empty{text-align:center;padding:40px 16px;color:#CBD5E1;font-size:13px}

.auth-screen{position:fixed;inset:0;background:#0F172A;display:flex;align-items:center;justify-content:center;z-index:3000;flex-direction:column;gap:22px;padding:20px}
.auth-logo img{width:170px;border-radius:12px;display:block}
.auth-card{background:#fff;border-radius:16px;padding:30px 28px;width:100%;max-width:380px}
.auth-tabs{display:flex;gap:4px;margin-bottom:20px;background:#F1F5F9;border-radius:9px;padding:3px}
.auth-tab{flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;color:#64748B;cursor:pointer;border-radius:7px;font-family:inherit;border:none;background:none}
.auth-tab.active{background:#fff;color:#0F172A;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.auth-field{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.auth-field label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.4px}
.auth-field input{border:1px solid #E2E8F0;border-radius:8px;padding:10px 12px;font-size:14px;color:#1E293B;font-family:inherit;outline:none;background:#F8FAFC}
.auth-field input:focus{border-color:#334155;background:#fff}
.auth-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:13px;color:#B91C1C;margin-bottom:13px;display:none}
.auth-err.show{display:block}
.btn-auth{background:#0F172A;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-auth:hover{background:#1E293B}
.btn-auth:disabled{opacity:.6;cursor:default}
.auth-hint{font-size:12px;color:#94A3B8;text-align:center;margin-top:14px;line-height:1.5}
.sb-user{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #E2E8F0;background:#F8FAFC}
.sb-user-info{display:flex;align-items:center;gap:8px;min-width:0}
.sb-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:#1E293B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:10px;color:#94A3B8}
.btn-logout{background:none;border:1px solid #E2E8F0;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:#64748B;font-family:inherit;flex-shrink:0}
.btn-logout:hover{background:#FEF2F2;color:#DC2626;border-color:#FECACA}
.btn-admin{background:#FEF2F2;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:#B91C1C;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:7px;font-family:inherit}
.btn-admin:hover{background:#FEE2E2}
.adm-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:600;align-items:center;justify-content:center;padding:20px}
.adm-overlay.open{display:flex}
.adm-modal{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.adm-hd{padding:18px 22px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.adm-hd-t{font-size:16px;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:8px}
.adm-body{padding:18px 22px;display:flex;flex-direction:column;gap:18px}
.adm-sec-t{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.code-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #E2E8F0;border-radius:10px;background:#FAFBFF}
.code-val{font-family:monospace;font-size:14px;font-weight:700;color:#0F172A;letter-spacing:1px}
.code-role{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.code-status{font-size:11px;margin-left:auto}
.btn-gen{border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#fff;display:inline-flex;align-items:center;gap:6px}
.gen-row{display:flex;gap:8px;flex-wrap:wrap}
.user-row2{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #E2E8F0;border-radius:10px;background:#FAFBFF}
.uav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.loading-screen{position:fixed;inset:0;background:#0F172A;display:flex;align-items:center;justify-content:center;z-index:3500;flex-direction:column;gap:18px}
.notif-wrap{position:relative}
.notif-bell{position:relative;background:none;border:1px solid #E2E8F0;border-radius:8px;width:34px;height:34px;cursor:pointer;color:#64748B;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-bell:hover{background:#F1F5F9;color:#0F172A}
.notif-badge{position:absolute;top:-5px;right:-5px;background:#EF4444;color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #F8FAFC}
.notif-panel{position:absolute;top:42px;right:0;width:330px;max-height:420px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;box-shadow:0 8px 28px rgba(15,23,42,.16);z-index:700;overflow:hidden;display:none;flex-direction:column}
.notif-panel.open{display:flex}
.notif-hd{padding:12px 15px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between}
.notif-hd-t{font-size:14px;font-weight:700;color:#0F172A}
.notif-readall{background:none;border:none;font-size:12px;color:#1D4ED8;cursor:pointer;font-family:inherit;font-weight:600}
.notif-readall:hover{text-decoration:underline}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:11px 15px;border-bottom:1px solid #F8FAFC;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.notif-item:hover{background:#F8FAFC}
.notif-item.unread{background:#EFF6FF}
.notif-item.unread:hover{background:#DBEAFE}
.notif-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.notif-txt{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:600;color:#0F172A;margin-bottom:1px}
.notif-body{font-size:12px;color:#64748B;line-height:1.4}
.notif-time{font-size:10px;color:#94A3B8;margin-top:3px}
.notif-empty{padding:36px 16px;text-align:center;color:#CBD5E1;font-size:13px}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#3B82F6;flex-shrink:0;margin-top:6px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

// API helper
function apiCall(method,path,body){
  return fetch("/api"+path,{
    method:method,
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+authToken},
    body:body?JSON.stringify(body):undefined
  }).then(function(res){
    if(res.status===401){doLogout();throw new Error("Session expir\u00e9e");}
    return res.json().then(function(data){
      if(!res.ok)throw new Error(data.error||"Erreur serveur");
      return data;
    });
  });
}
// Charge les appros depuis le serveur
function loadSheetsFromServer(){
  return apiCall("GET","/appros").then(function(data){
    sheets=(data||[]).map(function(s){return mig(s);});
    return sheets;
  });
}
function findServerId(localId){
  var s=null;sheets.forEach(function(x){if(x.id===localId)s=x;});
  return s?s._id:null;
}
function mig(s){
  if(s.typeChantier==="Multi-corps d&#39;\u00e9tat")s.typeChantier="Multi-corps d\u2019\u00e9tat";
  if(!s.dateAppro)s.dateAppro="";if(!s.conducteur)s.conducteur="";if(!s.coordClient)s.coordClient="";if(!s.priorite)s.priorite="normale";if(!s.notes)s.notes=[];if(!s.statut)s.statut="en_attente";if(s.preparedAt===undefined)s.preparedAt=null;
  if(!s.dateChantier)s.dateChantier="";
  if(!s.additionDates)s.additionDates=[];
  ["consommables","fournitures","outillage"].forEach(function(k){
    if(s[k])s[k]=s[k].map(function(r){return Object.assign({addBatch:null,returned:false,depotAdded:false},r);});
  });
  return s;
}

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function mkR(n,q){return{id:uid(),designation:n||"",quantite:q||"",disponibilite:"",addBatch:null,returned:false,depotAdded:false};}
function mkS(){
  return{id:uid(),
    reference:(function(){var n=new Date();return"REFJA"+n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");})(),
    noAffaire:"",nomChantier:"",chargeAffaires:"",conducteur:"",coordClient:"",dateAppro:"",dateChantier:"",
    typeChantier:"",typeConfirmed:false,priorite:"normale",notes:[],statut:"en_attente",preparedAt:null,additionDates:[],
    consommables:[mkR(),mkR(),mkR()],fournitures:[mkR(),mkR(),mkR()],outillage:[mkR(),mkR(),mkR()],
    observation:"",
    dateCreation:new Date().toLocaleDateString("fr-FR"),
    dateMiseAJour:new Date().toLocaleDateString("fr-FR"),
    createdAt:new Date().toISOString()
  };
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fd(iso){if(!iso)return"";var p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function tod(){return new Date().toISOString().slice(0,10);}
function pill(t,ok){
  if(!t)return"";
  var c=TC[t]||TC["Autre"];
  return "<span class=\"type-pill\" style=\"background:"+c.bg+";color:"+c.c+";border-color:"+c.b+"\"><i class=\"ti "+(ok?"ti-check":"ti-bolt")+"\" style=\"font-size:11px\"></i> "+esc(t)+"</span>";
}
function toast(msg,ico){
  ico=ico||"ti-check";
  var t=document.getElementById("toast");
  t.innerHTML="<i class=\"ti "+ico+"\" style=\"font-size:15px\"></i> "+msg;
  t.classList.add("show");clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove("show");},2800);
}

function showCp(){
  if(!cur){toast("Ouvrez une appro d&#39;abord","ti-alert-circle");return;}
  var body=document.getElementById("cp-body"),html="";
  Object.keys(CAT).forEach(function(sec){
    var items=CAT[sec];
    html+="<div class=\"cp-sec\"><div class=\"cp-sec-hd\"><div class=\"cp-sec-title\"><i class=\"ti "+CAT_I[sec]+"\" style=\"font-size:14px\"></i> "+CAT_L[sec]+"</div><button class=\"btn-all\" onclick=\"selAll('"+sec+"')\">Tout cocher</button></div>";
    items.forEach(function(item,i){
      html+="<div class=\"cp-row\"><input type=\"checkbox\" id=\"ci_"+sec+"_"+i+"\" class=\"ccb\" data-sec=\""+sec+"\" data-n=\""+esc(item.n)+"\" onchange=\"updN()\"/><label for=\"ci_"+sec+"_"+i+"\" class=\"cp-row-n\" style=\"cursor:pointer\">"+esc(item.n)+"</label><div style=\"display:flex;flex-direction:column;align-items:center\"><input type=\"number\" id=\"cq_"+sec+"_"+i+"\" class=\"cp-qty\" value=\""+item.q+"\" min=\"1\"/><div class=\"cp-qty-l\">qt&#233;</div></div></div>";
    });

  });

  document.getElementById("cp-overlay").style.display="block";
  document.getElementById("cp-panel").classList.add("open");
}
function hideCp(){document.getElementById("cp-overlay").style.display="none";document.getElementById("cp-panel").classList.remove("open");}
function selAll(sec){document.querySelectorAll(".ccb[data-sec=\""+sec+"\"]").forEach(function(c){c.checked=true;});updN();}
function clearCp(){document.querySelectorAll(".ccb").forEach(function(c){c.checked=false;});updN();}
function updN(){
  var n=document.querySelectorAll(".ccb:checked").length;
  document.getElementById("cp-n").textContent=n;
  document.getElementById("cp-info").textContent=n===0?"S&#233;lectionnez des articles":n+" article"+(n>1?"s":"")+" s&#233;lectionn&#233;"+(n>1?"s":"");
}
function insertCp(){
  var checked=document.querySelectorAll(".ccb:checked");
  if(!checked.length){toast("Aucun article s&#233;lectionn&#233;","ti-alert-circle");return;}
  var cnt=0;
  checked.forEach(function(cb){
    var sec=cb.dataset.sec,name=cb.dataset.n;
    var all=Array.from(document.querySelectorAll(".ccb[data-sec=\""+sec+"\"]"));
    var idx=all.indexOf(cb);
    var qEl=document.getElementById("cq_"+sec+"_"+idx);
    var qty=qEl?qEl.value:"1";
    var row=mkR(name,qty);
    if(currentRole==="depot"){row.depotAdded=true;}
    if(addMode&&addDate){
      row.addBatch=addDate;
      if(!cur.additionDates)cur.additionDates=[];
      if(cur.additionDates.indexOf(addDate)<0)cur.additionDates.push(addDate);
    }
    if(cur[sec].length&&!cur[sec][cur[sec].length-1].designation)cur[sec].splice(cur[sec].length-1,1);
    cur[sec].push(row);cnt++;
  });
  saved=false;hideCp();renderForm();
  toast(cnt+" article"+(cnt>1?"s":"")+" ins&#233;r&#233;"+(cnt>1?"s":""),"ti-circle-check");
}

function depotItemsPreview(s){
  var all=[];
  ["consommables","fournitures","outillage"].forEach(function(k){
    s[k].forEach(function(r){if(r.designation)all.push(r);});
  });
  if(!all.length)return "<span style=\"font-style:italic;color:#CBD5E1\">Aucun article</span>";

  var h="";
  show.forEach(function(it){

  });
  if(all.length>4)h+="<div style=\"color:#94A3B8;font-size:10px;margin-top:2px\">+"+(all.length-4)+" autre"+(all.length-4>1?"s":"")+"...</div>";
  return h;
}
function renderDepot(){
  cur=null;currentTab="depot";
  // List 1: a preparer (statut en_attente), sorted by priority
  var aPreparer=sheets.filter(function(s){return s.statut==="en_attente";});
  aPreparer.sort(function(a,b){
    var pa=(PRIO[a.priorite]||PRIO.normale).rank;
    var pb=(PRIO[b.priorite]||PRIO.normale).rank;
    if(pb!==pa)return pb-pa;
    // then by date appro (earliest first)
    return (a.dateAppro||"9999").localeCompare(b.dateAppro||"9999");
  });
  // List 2: au depot (statut prete)
  var auDepot=sheets.filter(function(s){return s.statut==="prete";});
  auDepot.sort(function(a,b){return (b.preparedAt||"").localeCompare(a.preparedAt||"");});

  var h="";
  h+="<div class=\"depot-wrap\">";

  // COLUMN 1 - A PREPARER
  h+="<div class=\"depot-col\">";
  h+="<div class=\"depot-col-hd\" style=\"background:#FFF7ED;color:#92400E\"><i class=\"ti ti-clipboard-list\" style=\"font-size:18px\"></i> \u00c0 pr\u00e9parer<span class=\"dch-n\">"+aPreparer.length+"</span></div>";
  if(!aPreparer.length){
    h+="<div class=\"depot-empty\"><i class=\"ti ti-check\" style=\"font-size:32px\"></i><div style=\"margin-top:8px\">Tout est pr\u00e9par\u00e9 !</div></div>";
  } else {
    aPreparer.forEach(function(s){
      var pr=PRIO[s.priorite]||PRIO.normale;
      var isUrgent=(s.priorite&&s.priorite!=="normale");
      h+="<div class=\"depot-card\""+(isUrgent?" style=\"border-left:4px solid "+pr.color+";padding-left:9px\"":"")+">";
      h+="<div onclick=\"openFromDepot('"+s.id+"')\">";

function condInitials(name){
  if(!name)return "?";
  return name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
}
function previewItems(s){
  var all=[];
  ["consommables","fournitures","outillage"].forEach(function(k){
    s[k].forEach(function(r){if(r.designation)all.push({n:r.designation,q:r.quantite});});
  });
  if(!all.length)return "<div style=\"font-size:10px;color:#CBD5E1;font-style:italic\">Aucun article</div>";
  var total=all.length;
  var show=all.slice(0,3);
  var h="<div style=\"background:#F8FAFC;border:1px solid #F1F5F9;border-radius:7px;padding:6px 8px;margin-top:8px\">";
  show.forEach(function(it){
    h+="<div style=\"font-size:10px;color:#475569;display:flex;justify-content:space-between;gap:6px;line-height:1.5;white-space:nowrap;overflow:hidden\"><span style=\"overflow:hidden;text-overflow:ellipsis\">"+esc(it.n)+"</span>"+(it.q?"<span style=\"color:#94A3B8;flex-shrink:0\">x"+esc(it.q)+"</span>":"")+"</div>";
  });
  if(total>3)h+="<div style=\"font-size:9px;color:#94A3B8;margin-top:2px\">+"+(total-3)+" autre"+(total-3>1?"s":"")+" article"+(total-3>1?"s":"")+"...</div>";
  h+="</div>";
  return h;
}

async function classify(){
  var btn=document.getElementById("btn-ai");if(!btn||!cur)return;
  var items=[].concat(cur.consommables,cur.fournitures,cur.outillage).map(function(r){return r.designation;}).filter(Boolean);
  if(!items.length){window._err="Ajoutez des articles avant de classifier.";renderForm();return;}
  btn.disabled=true;btn.innerHTML="<i class=\"ti ti-loader-2\" style=\"font-size:13px\"></i> Analyse...";window._err=null;
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:"Expert BTP cordiste. Type parmi: "+WT.join(", ")+".\nChantier: \""+cur.nomChantier+"\", Articles: "+items.join(", ")+"\nJSON uniquement: {\"typeChantier\":\"...\",\"confidence\":0.95,\"justification\":\"...\"}"}]})
    });
    var d=await res.json();
    var txt=d.content.filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("");
    aiSug=JSON.parse(txt.replace(/```json|```/g,"").trim());
    cur.typeChantier=aiSug.typeChantier;cur.typeConfirmed=false;
  }catch(e){window._err=e.message||"Erreur IA";}
  renderForm();
}

function delS(id){
  if(!confirm("Supprimer cette appro d\u00e9finitivement ?"))return;
  var sid=findServerId(id);
  if(!sid){sheets=sheets.filter(function(s){return s.id!==id;});if(cur&&cur.id===id)renderWelcome();else renderList();return;}
  apiCall("DELETE","/appros/"+sid).then(function(){
    sheets=sheets.filter(function(s){return s.id!==id;});
    if(cur&&cur.id===id)goBack();else renderList();
    toast("Appro supprim\u00e9e","ti-trash");
  }).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
}
function rateSheet(id,stars){
  var s=null;sheets.forEach(function(x){if(x.id===id)s=x;});
  if(!s)return;
  if(!s.notes)s.notes=[];
  // R\u00e8gle: le cr\u00e9ateur ne peut pas noter sa propre appro
  if(s._createdBy&&currentUser&&s._createdBy===currentUser.id){
    toast("Vous ne pouvez pas noter votre propre appro","ti-alert-circle");return;
  }
  var voter=currentUser?currentUser.id:"anon";
  var existing=null;
  s.notes.forEach(function(n){if(n.voter===voter)existing=n;});
  if(existing)existing.stars=stars;
  else s.notes.push({voter:voter,stars:stars});
  if(cur&&cur.id===id)cur.notes=s.notes;
  if(s._id){
    apiCall("PUT","/appros/"+s._id,s).then(function(){
      if(cur&&cur.id===id)renderForm();else renderList();
      toast("Note enregistr\u00e9e : "+stars+"/5","ti-star-filled");
    }).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
  }
}

      cur._id=existing._id;
      for(var i=0;i<sheets.length;i++){if(sheets[i].id===cur.id){sheets[i]=JSON.parse(JSON.stringify(cur));break;}}
    });

    p=apiCall("POST","/appros",cur).then(function(saved){
      cur._id=saved._id;

// ═══════════════ NOTIFICATIONS ═══════════════
var notifData=[];
var notifPollTimer=null;
var notifOpen=false;
var NOTIF_ICONS={
  appro_creee:{ic:"ti-clipboard-plus",bg:"#FFF7ED",col:"#C2410C"},
  appro_prete:{ic:"ti-package-import",bg:"#D1FAE5",col:"#065F46"},
  appro_rendue:{ic:"ti-checks",bg:"#DBEAFE",col:"#1D4ED8"},
  appro_modifiee:{ic:"ti-edit",bg:"#F1F5F9",col:"#475569"}
};

function loadNotifs(){
  if(!authToken)return;
  apiCall("GET","/notifications").then(function(data){
    notifData=data||[];
    renderNotifs();
  }).catch(function(){});
}

function startNotifPolling(){
  if(notifPollTimer)clearInterval(notifPollTimer);
  // V\u00e9rifie les nouvelles notifs toutes les 30 secondes
  notifPollTimer=setInterval(loadNotifs,30000);
}

function renderNotifs(){
  var unread=notifData.filter(function(n){return !n.is_read;}).length;
  var badge=document.getElementById("notif-badge");
  if(badge){
    if(unread>0){badge.style.display="flex";badge.textContent=unread>9?"9+":unread;}
    else badge.style.display="none";
  }
  var list=document.getElementById("notif-list");
  if(!list)return;
  if(!notifData.length){
    list.innerHTML="<div class=\"notif-empty\"><i class=\"ti ti-bell-off\" style=\"font-size:28px\"></i><div style=\"margin-top:8px\">Aucune notification</div></div>";
    return;
  }
  var h="";
  notifData.forEach(function(n){
    var conf=NOTIF_ICONS[n.type]||{ic:"ti-bell",bg:"#F1F5F9",col:"#64748B"};
    h+="<div class=\"notif-item"+(n.is_read?"":" unread")+"\" onclick=\"openNotif('"+n.id+"','"+(n.appro_id||"")+"')\">";
    h+="<div class=\"notif-ic\" style=\"background:"+conf.bg+";color:"+conf.col+"\"><i class=\"ti "+conf.ic+"\"></i></div>";
    h+="<div class=\"notif-txt\"><div class=\"notif-title\">"+esc(n.title)+"</div>";
    if(n.body)h+="<div class=\"notif-body\">"+esc(n.body)+"</div>";
    h+="<div class=\"notif-time\">"+notifTime(n.created_at)+"</div></div>";
    if(!n.is_read)h+="<span class=\"notif-dot\"></span>";
    h+="</div>";
  });
  list.innerHTML=h;
}

function notifTime(iso){
  try{
    var d=new Date(iso),now=new Date();
    var diff=Math.floor((now-d)/1000);
    if(diff<60)return "\u00e0 l'instant";
    if(diff<3600)return "il y a "+Math.floor(diff/60)+" min";
    if(diff<86400)return "il y a "+Math.floor(diff/3600)+" h";
    if(diff<604800)return "il y a "+Math.floor(diff/86400)+" j";
    return d.toLocaleDateString("fr-FR");
  }catch(e){return "";}
}

function toggleNotif(){
  notifOpen=!notifOpen;
  var panel=document.getElementById("notif-panel");
  if(panel)panel.classList.toggle("open",notifOpen);
  if(notifOpen)loadNotifs();
}

function openNotif(id,approId){
  // Marque comme lue
  apiCall("PUT","/notifications/"+id+"/read").then(function(){
    var n=notifData.find(function(x){return x.id===id;});
    if(n)n.is_read=true;
    renderNotifs();
  }).catch(function(){});
  // Ouvre l'appro concern\u00e9e si elle existe
  if(approId){
    var sheet=sheets.find(function(s){return s._id===approId;});
    if(sheet){
      toggleNotif();
      if(currentRole==="depot"){openFromDepot(sheet.id);}
      else{openSheet(sheet.id);}
    }
  }
}

function markAllRead(){
  apiCall("PUT","/notifications/read-all").then(function(){
    notifData.forEach(function(n){n.is_read=true;});
    renderNotifs();
    toast("Notifications marqu\u00e9es comme lues","ti-check");
  }).catch(function(){});
}

// Ferme le panneau si on clique ailleurs
document.addEventListener("click",function(e){
  var wrap=document.querySelector(".notif-wrap");
  if(notifOpen&&wrap&&!wrap.contains(e.target)){
    notifOpen=false;
    var panel=document.getElementById("notif-panel");
    if(panel)panel.classList.remove("open");
  }
});

var ROLE_INFO={
  admin:{label:"Administrateur",color:"#DC2626",bg:"#FEE2E2"},
  conducteur:{label:"Conducteur de travaux",color:"#1D4ED8",bg:"#DBEAFE"},
  depot:{label:"Chef d\u00e9p\u00f4t",color:"#065F46",bg:"#D1FAE5"}
};

function showAuthTab(t){
  document.getElementById("tab-login").classList.toggle("active",t==="login");
  document.getElementById("tab-register").classList.toggle("active",t==="register");
  document.getElementById("login-form").style.display=(t==="login")?"block":"none";
  document.getElementById("register-form").style.display=(t==="register")?"block":"none";
  document.getElementById("auth-err").classList.remove("show");
}
function authErr(msg){
  var e=document.getElementById("auth-err");
  e.textContent=msg;e.classList.add("show");
}
function doLogin(){
  var username=document.getElementById("li-user").value.trim();
  var password=document.getElementById("li-pass").value;
  if(!username||!password){authErr("Identifiant et mot de passe requis");return;}
  var btn=document.getElementById("btn-login");
  btn.disabled=true;btn.innerHTML="<i class=\"ti ti-loader-2\"></i> Connexion...";
  fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username,password:password})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(res){
      if(!res.ok){authErr(res.d.error||"Erreur");return;}
      authToken=res.d.token;currentUser=res.d.user;
      try{localStorage.setItem("appro_token",authToken);}catch(e){}
      enterApp();
    })
    .catch(function(){authErr("Erreur de connexion au serveur");})
    .finally(function(){btn.disabled=false;btn.innerHTML="<i class=\"ti ti-login\"></i> Se connecter";});
}
function doRegister(){
  var name=document.getElementById("rg-name").value.trim();
  var email=document.getElementById("rg-email").value.trim();
  var username=document.getElementById("rg-user").value.trim();
  var password=document.getElementById("rg-pass").value;
  var code=document.getElementById("rg-code").value.trim().toUpperCase();
  if(!name||!email||!username||!password||!code){authErr("Tous les champs sont requis");return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){authErr("Adresse email invalide");return;}
  if(password.length<6){authErr("Mot de passe trop court (6 caract\u00e8res min.)");return;}
  var btn=document.getElementById("btn-register");
  btn.disabled=true;btn.innerHTML="<i class=\"ti ti-loader-2\"></i> Cr\u00e9ation...";
  fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name,email:email,username:username,password:password,code:code})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(res){
      if(!res.ok){authErr(res.d.error||"Erreur");return;}
      authToken=res.d.token;currentUser=res.d.user;
      try{localStorage.setItem("appro_token",authToken);}catch(e){}
      enterApp();
    })
    .catch(function(){authErr("Erreur de connexion au serveur");})
    .finally(function(){btn.disabled=false;btn.innerHTML="<i class=\"ti ti-user-plus\"></i> Cr\u00e9er mon compte";});
}
function doLogout(){
  authToken=null;currentUser=null;
  if(notifPollTimer){clearInterval(notifPollTimer);notifPollTimer=null;}
  notifData=[];
  try{localStorage.removeItem("appro_token");}catch(e){}
  document.getElementById("app").style.display="none";
  document.getElementById("auth-screen").style.display="flex";
  document.getElementById("li-user").value="";
  document.getElementById("li-pass").value="";
}
function enterApp(){
  // Configure sidebar selon le r\u00f4le
  var ri=ROLE_INFO[currentUser.role]||ROLE_INFO.conducteur;
  var initials=currentUser.name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  var av=document.getElementById("sb-avatar");
  av.style.background=ri.bg;av.style.color=ri.color;av.textContent=initials;
  document.getElementById("sb-user-name").textContent=currentUser.name;
  document.getElementById("sb-user-role").textContent=ri.label;
  document.getElementById("btn-admin").style.display=(currentUser.role==="admin")?"flex":"none";
  // currentRole pilote l'affichage (conducteur/depot)
  currentRole=(currentUser.role==="depot")?"depot":"conducteur";
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  // Charge les donn\u00e9es
  loadSheetsFromServer().then(function(){
    applyRoleView();
  }).catch(function(e){
    toast("Erreur de chargement: "+e.message,"ti-alert-circle");
    applyRoleView();
  });
  // D\u00e9marre les notifications
  loadNotifs();
  startNotifPolling();
}
function applyRoleView(){
  var newBtn=document.getElementById("btn-new-sb");
  var slist=document.getElementById("sheets-list");
  var srch=document.getElementById("srch");
  if(currentRole==="depot"){
    if(newBtn)newBtn.style.display="none";
    if(slist)slist.style.display="none";
    if(srch)srch.style.display="none";
    renderDepot();
  }else{
    if(newBtn)newBtn.style.display="flex";
    if(slist)slist.style.display="";
    if(srch)srch.style.display="";
    renderWelcome();
  }
}

      h+="<button onclick=\"admSetEmail('"+u.id+"','"+esc(u.email||"")+"')\" title=\"Modifier l'email\" style=\"background:none;border:1px solid #E2E8F0;border-radius:6px;padding:4px 9px;cursor:pointer;color:#64748B;font-family:inherit;font-size:12px\"><i class=\"ti ti-mail-cog\"></i></button>";
      h+="<button onclick=\"admResetPwd('"+u.id+"')\" title=\"R\u00e9initialiser le mot de passe\" style=\"background:none;border:1px solid #E2E8F0;border-radius:6px;padding:4px 9px;cursor:pointer;color:#64748B;font-family:inherit;font-size:12px\"><i class=\"ti ti-key\"></i></button>";
      if(!isSelf)h+="<button onclick=\"admDelUser('"+u.id+"')\" title=\"Supprimer\" style=\"background:none;border:1px solid #FECACA;border-radius:6px;padding:4px 9px;cursor:pointer;color:#DC2626;font-family:inherit;font-size:12px\"><i class=\"ti ti-trash\"></i></button>";
      h+="</div>";
    });
    h+="</div></div>";
    body.innerHTML=h;
  }).catch(function(e){body.innerHTML="<div style=\"color:#DC2626;padding:20px\">Erreur: "+e.message+"</div>";});
}
function genCode(role){
  apiCall("POST","/invites",{role:role}).then(function(r){
    renderAdmin();
    toast("Code g\u00e9n\u00e9r\u00e9 : "+r.code,"ti-ticket");
  }).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
}
function copyCode(code){
  try{navigator.clipboard.writeText(code);toast("Code copi\u00e9 : "+code,"ti-copy");}
  catch(e){toast("Code : "+code,"ti-ticket");}
}
function delCode(code){
  if(!confirm("Supprimer ce code ?"))return;
  apiCall("DELETE","/invites/"+code).then(function(){renderAdmin();toast("Code supprim\u00e9","ti-trash");}).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
}
function admSetEmail(id,current){
  var email=prompt("Adresse email de cet utilisateur :",current||"");
  if(email===null)return;
  email=email.trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){toast("Adresse email invalide","ti-alert-circle");return;}
  apiCall("PUT","/users/"+id+"/email",{email:email}).then(function(){renderAdmin();toast("Email mis \u00e0 jour","ti-check");}).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
}
function admResetPwd(id){
  var pwd=prompt("Nouveau mot de passe (6 caract\u00e8res min.) :");
  if(!pwd)return;
  if(pwd.length<6){toast("Mot de passe trop court","ti-alert-circle");return;}
  apiCall("PUT","/users/"+id+"/password",{password:pwd}).then(function(){toast("Mot de passe mis \u00e0 jour","ti-check");}).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
}
function admDelUser(id){
  if(!confirm("Supprimer cet utilisateur ?"))return;
  apiCall("DELETE","/users/"+id).then(function(){renderAdmin();toast("Utilisateur supprim\u00e9","ti-trash");}).catch(function(e){toast("Erreur: "+e.message,"ti-alert-circle");});
}

// ═══════════════ DEMARRAGE ═══════════════
(function(){
  var saved=null;
  try{saved=localStorage.getItem("appro_token");}catch(e){}
  if(saved){
    authToken=saved;
    fetch("/api/auth/refresh",{method:"POST",headers:{"Authorization":"Bearer "+saved}})
      .then(function(r){if(!r.ok)throw new Error("expired");return r.json();})
      .then(function(d){
        authToken=d.token;currentUser=d.user;
        try{localStorage.setItem("appro_token",authToken);}catch(e){}
        enterApp();
      })
      .catch(function(){
        try{localStorage.removeItem("appro_token");}catch(e){}
        document.getElementById("loading-screen").style.display="none";
        document.getElementById("auth-screen").style.display="flex";
      });
  }else{
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("auth-screen").style.display="flex";
  }
})();
</script>
